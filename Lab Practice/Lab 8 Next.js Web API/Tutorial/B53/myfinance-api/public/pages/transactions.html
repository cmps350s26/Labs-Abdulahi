<h2>Transactions</h2>
<div class="card form-card">
    <h3 id="transactions-form-title">Add Transaction</h3>
    <form id="transaction-form">
        <div class="form-row">
            <div class="form-group">
                <label for="txn-accountId">Account</label>
                <select id="txn-accountId" name="accountId" required>
                    <option value="">-- Select Account --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="txn-description">Description</label>
                <input type="text" id="txn-description" name="description" required>
            </div>
            <div class="form-group">
                <label for="txn-amount">Amount (QAR)</label>
                <input type="number" id="txn-amount" name="amount" step="0.01" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="txn-type">Type</label>
                <select id="txn-type" name="type" required>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <div class="form-group">
                <label for="txn-category">Category</label>
                <select id="txn-category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Housing">Housing</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Salary">Salary</option>
                </select>
            </div>
            <div class="form-group">
                <label for="txn-date">Date</label>
                <input type="date" id="txn-date" name="date" required>
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary" id="transactions-submit-btn">Add Transaction</button>
            <button type="button" class="btn btn-secondary hidden" id="transactions-cancel-btn"
                onclick="cancelEditTransaction()">Cancel</button>
        </div>
    </form>
</div>
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Type</th>
                <th>Amount (QAR)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="transactions-table-body">
            <tr>
                <td colspan="6" class="empty-message">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>
